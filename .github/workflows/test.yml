name: Run Tests
on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1

    - name: Install dependencies
      run: poetry install --with dev -E yaml -E lsp

    - name: Check package metadata
      run: poetry check

    - name: Run ruff
      run: poetry run ruff check .

    - name: Run mypy
      run: poetry run mypy cp2k_input_tools

  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      uses: snok/install-poetry@v1

    - name: Install dependencies
      run: poetry install --with dev -E yaml -E lsp

    - name: Run pytest
      run: poetry run pytest --cov-report=xml --cov-report=term-missing --cov-fail-under=40 --cov=cp2k_input_tools tests/

    - uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}

  extras-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extras:
        - ''
        - '[yaml]'
        - '[lsp]'
        - '[yaml,lsp]'

    steps:
    - uses: actions/checkout@v4

    - name: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install package with selected extras
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".${{ matrix.extras }}"

    - name: Run import smoke tests
      run: |
        python - <<'PY'
        import cp2k_input_tools
        from cp2k_input_tools.parser import CP2KInputParser

        assert cp2k_input_tools is not None
        assert CP2KInputParser() is not None
        PY

    - name: Check core console scripts
      run: |
        fromcp2k --help
        tocp2k --help
        cp2klint --help
        cp2kgen --help
        cp2kget --help

  package-smoke:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1

    - name: Install dependencies
      run: poetry install --with dev -E yaml -E lsp

    - name: Build package
      run: poetry build

    - name: Install wheel and run smoke checks
      run: |
        python -m venv /tmp/cp2k-input-tools-wheel-smoke
        /tmp/cp2k-input-tools-wheel-smoke/bin/python -m pip install --upgrade pip
        /tmp/cp2k-input-tools-wheel-smoke/bin/python -m pip install dist/*.whl
        /tmp/cp2k-input-tools-wheel-smoke/bin/python - <<'PY'
        from cp2k_input_tools.parser import CP2KInputParser

        assert CP2KInputParser() is not None
        PY
        /tmp/cp2k-input-tools-wheel-smoke/bin/cp2klint --help
        /tmp/cp2k-input-tools-wheel-smoke/bin/cp2k-language-server --help
