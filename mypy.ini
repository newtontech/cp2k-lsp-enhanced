[mypy]
python_version = 3.10
warn_unused_configs = True
namespace_packages = True
plugins = pydantic.mypy

[mypy-pint]
ignore_missing_imports = True

[mypy-transitions]
ignore_missing_imports = True

[mypy-ruamel]
ignore_missing_imports = True

[mypy-ruamel.yaml]
ignore_missing_imports = True

[mypy-lsprotocol]
ignore_missing_imports = True

[mypy-lsprotocol.types]
ignore_missing_imports = True

[mypy-pygls]
ignore_missing_imports = True

[mypy-pygls.server]
ignore_missing_imports = True
follow_imports = skip

[mypy-cp2k_lsp]
ignore_missing_imports = True

[mypy-cp2k_lsp.agent_api]
ignore_missing_imports = True

[mypy-cp2k_lsp.agent_api.schema]
ignore_missing_imports = True
